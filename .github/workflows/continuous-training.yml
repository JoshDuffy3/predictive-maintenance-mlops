name: Continuous Training

on:
  workflow_dispatch:

  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "data/**"
      - "requirements.txt"
      - ".github/workflows/continuous-training.yml"

jobs:
  train-evaluate-monitor:
    name: Train, evaluate and monitor model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: python src/download_data.py

      - name: Preprocess dataset
        run: python src/preprocess.py

      - name: Train model
        run: python src/train.py

      - name: Evaluate model
        run: python src/evaluate.py

      - name: Monitor model quality
        run: python src/monitor.py

      - name: Print model decision
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          status_path = Path("models/monitor_status.json")

          if not status_path.exists():
              raise FileNotFoundError("models/monitor_status.json was not created.")

          with open(status_path, "r", encoding="utf-8") as file:
              status = json.load(file)

          model_status = status["model_status"]

          print("Model monitoring decision")
          print("-------------------------")
          print(f"F1 score: {model_status.get('f1_score')}")
          print(f"Threshold: {model_status.get('acceptance_threshold')}")
          print(f"Model accepted: {model_status.get('model_accepted')}")
          print(f"Retraining required: {model_status.get('retraining_required')}")
          PY

      - name: Upload model and monitoring artefacts
        uses: actions/upload-artifact@v4
        with:
          name: predictive-maintenance-model-artefacts
          path: |
            models/model.joblib
            models/metrics.json
            models/evaluation_report.json
            models/monitor_status.json
            data/processed_ai4i2020.csv
            data/preprocessing_report.json